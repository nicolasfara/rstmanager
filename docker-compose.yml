services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${RSTMANAGER_DB_NAME:-rstmanager}
      POSTGRES_USER: ${RSTMANAGER_DB_USER:-rstmanager}
      POSTGRES_PASSWORD: ${RSTMANAGER_DB_PASSWORD:-rstmanager}
    ports:
      - "${RSTMANAGER_DB_PUBLISHED_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      rstmanager:
        aliases:
          - postgres

  planning-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        JDK_IMAGE: ${RSTMANAGER_JDK_IMAGE:-eclipse-temurin:17-jdk-jammy}
        RUNTIME_IMAGE: ${RSTMANAGER_RUNTIME_IMAGE:-eclipse-temurin:17-jre-jammy}
        SBT_VERSION: ${RSTMANAGER_SBT_VERSION:-1.12.11}
    environment:
      RSTMANAGER_HTTP_HOST: 0.0.0.0
      RSTMANAGER_HTTP_PORT: 8080
      RSTMANAGER_DB_HOST: postgres
      RSTMANAGER_DB_PORT: 5432
      RSTMANAGER_DB_NAME: ${RSTMANAGER_DB_NAME:-rstmanager}
      RSTMANAGER_DB_USER: ${RSTMANAGER_DB_USER:-rstmanager}
      RSTMANAGER_DB_PASSWORD: ${RSTMANAGER_DB_PASSWORD:-rstmanager}
      RSTMANAGER_DB_POOL_SIZE: ${RSTMANAGER_DB_POOL_SIZE:-4}
    ports:
      - "${RSTMANAGER_HTTP_PUBLISHED_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rstmanager

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NODE_IMAGE: ${RSTMANAGER_NODE_IMAGE:-node:22-bookworm}
        NGINX_IMAGE: ${RSTMANAGER_NGINX_IMAGE:-nginx:1.27-alpine}
        SBT_VERSION: ${RSTMANAGER_SBT_VERSION:-1.12.11}
    ports:
      - "${RSTMANAGER_FRONTEND_PUBLISHED_PORT:-3333}:80"
    depends_on:
      planning-service:
        condition: service_started
    networks:
      - rstmanager

volumes:
  postgres-data:

networks:
  rstmanager:
